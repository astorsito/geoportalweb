<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geoportal de Seguridad - Riobamba GIS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 flex flex-col h-screen overflow-hidden">

    <header class="bg-slate-900 text-white px-6 py-4 flex justify-between items-center shadow-lg border-b border-slate-700 z-20">
        <div class="flex items-center space-x-3">
            <div class="relative flex h-4 w-4 mr-2">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-4 w-4 bg-red-500 border-2 border-slate-900"></span>
            </div>
            <div>
                <h1 class="text-xl font-bold leading-tight tracking-wide">SICOA - Centro de Monitoreo</h1>
                <p class="text-xs text-slate-400">Riobamba | Recepción de Alertas en Tiempo Real</p>
            </div>
        </div>
        <div class="flex gap-3">
            <span id="statusGeoServer" class="bg-yellow-500/20 text-yellow-400 text-xs px-3 py-1.5 rounded-full border border-yellow-500/30 flex items-center shadow-inner">
                <i class="fa-solid fa-satellite-dish mr-2 animate-pulse"></i> Conectando WFS...
            </span>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <aside class="w-72 bg-white border-r border-gray-200 p-5 overflow-y-auto flex flex-col shadow-xl z-10">
            <div class="space-y-4">
                <div class="border-b pb-3">
                    <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-filter text-indigo-600"></i> Filtros de Búsqueda
                    </h2>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Buscar por Cédula</label>
                    <input type="text" id="filterCedula" placeholder="Ej: 0601234567" class="w-full bg-slate-50 border border-slate-300 rounded-md p-2 text-xs outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Tipo de Emergencia</label>
                    <select id="filterTipo" class="w-full bg-slate-50 border border-slate-300 rounded-md p-2 text-xs outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500">
                        <option value="todos">Todas las alertas</option>
                        <option value="Asalto">Asalto o Robo</option>
                        <option value="Emergencia Médica">Emergencia Médica</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Género de la Víctima</label>
                    <select id="filterGenero" class="w-full bg-slate-50 border border-slate-300 rounded-md p-2 text-xs outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                        <option value="todos">Todos</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                    </select>
                </div>

                <div class="pt-2 space-y-2">
                    <button id="btnAplicarFiltros" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs py-2 rounded shadow transition">
                        <i class="fa-solid fa-magnifying-glass mr-1"></i> Aplicar Filtros
                    </button>
                    <button id="btnLimpiarFiltros" class="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold text-xs py-2 rounded transition">
                        <i class="fa-solid fa-eraser mr-1"></i> Limpiar Todo
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-full bg-slate-200">
            
            <div id="map" class="flex-1 w-full z-0"></div>

            <div class="h-64 bg-white border-t border-slate-300 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] flex flex-col z-10">
                <div class="bg-slate-800 px-4 py-2 flex justify-between items-center border-b border-slate-700">
                    <h3 class="font-bold text-white text-xs uppercase tracking-widest">
                        <i class="fa-solid fa-list-ul mr-2 text-indigo-400"></i> Log de Emergencias en Vivo
                    </h3>
                    <button id="btnRefresh" class="text-[10px] bg-slate-700 hover:bg-slate-600 text-white px-3 py-1 rounded border border-slate-600 transition">
                        <i class="fa-solid fa-arrows-rotate mr-1"></i> Forzar Actualización
                    </button>
                </div>
                
                <div class="overflow-x-auto w-full pb-4">
                    <table class="min-w-max w-full text-left border-collapse">
                       <thead class="bg-slate-100 sticky top-0 shadow-sm z-10">
                            <tr>
                                <th class="p-3 border-b border-slate-200 text-slate-600 font-bold uppercase w-16">ID</th>
                                <th class="p-3 border-b border-slate-200 text-slate-600 font-bold uppercase">Hora</th>
                                <th class="p-3 border-b border-slate-200 text-slate-600 font-bold uppercase">Ciudadano (Cédula)</th>
                                <th class="p-3 border-b border-slate-200 text-slate-600 font-bold uppercase text-center">Tipo Alerta</th>
                                <th class="p-3 border-b border-slate-200 text-slate-600 font-bold uppercase text-center">Género</th>
                                <th class="p-3 border-b border-slate-200 text-slate-600 font-bold uppercase w-1/3">Ubicación Interactiva</th>
                            </tr>
                        </thead>
                        <tbody id="tablaEmergenciasBody" class="divide-y divide-slate-100 bg-white">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
