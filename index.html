<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICOA - Geoportal de Seguridad Riobamba</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        .custom-alert-pin { background: transparent; border: none; }
        .infra-pin { background: transparent; border: none; }
    </style>
</head>
<body class="bg-slate-100 flex flex-col h-screen overflow-hidden font-sans">

    <header class="bg-slate-900 text-white px-6 py-4 flex justify-between items-center shadow-lg border-b border-slate-700 z-20">
        <div class="flex items-center space-x-3">
            <div class="relative flex h-4 w-4 mr-2">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-4 w-4 bg-red-500 border-2 border-slate-900"></span>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-wide">SICOA - ECU 911 Riobamba</h1>
                <p class="text-xs text-slate-400 font-medium">Centro de Monitoreo GIS y Análisis Espacial</p>
            </div>
        </div>
        <div class="flex gap-3">
            <span id="statusGeoServer" class="bg-yellow-500/20 text-yellow-400 text-xs px-3 py-1.5 rounded-full border border-yellow-500/30 flex items-center shadow-inner">
                <i class="fa-solid fa-satellite-dish mr-2 animate-pulse"></i> Iniciando Sistema...
            </span>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <aside class="w-80 bg-white border-r border-slate-200 p-5 overflow-y-auto flex flex-col shadow-xl z-10">
            
            <div class="space-y-4">
                <div class="border-b pb-2">
                    <h2 class="text-sm font-black text-slate-800 uppercase tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-filter text-indigo-600"></i> Filtros de Búsqueda
                    </h2>
                </div>

                <div>
                    <input type="text" id="filterCedula" placeholder="Buscar Cédula: Ej. 060..." class="w-full bg-slate-50 border border-slate-300 rounded p-2 text-xs outline-none focus:border-indigo-500">
                </div>

                <div class="flex gap-2">
                    <select id="filterTipo" class="w-1/2 bg-slate-50 border border-slate-300 rounded p-2 text-xs outline-none focus:border-red-500">
                        <option value="todos">Tipo Alerta</option>
                        <option value="Asalto">🔫 Asalto</option>
                        <option value="Emergencia Médica">🚑 Médica</option>
                    </select>
                    <select id="filterGenero" class="w-1/2 bg-slate-50 border border-slate-300 rounded p-2 text-xs outline-none focus:border-indigo-500">
                        <option value="todos">Género</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                    </select>
                </div>

                <div class="pt-1 flex gap-2">
                    <button id="btnAplicarFiltros" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-[11px] py-2 rounded shadow transition">
                        <i class="fa-solid fa-magnifying-glass"></i> Aplicar
                    </button>
                    <button id="btnLimpiarFiltros" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold text-[11px] py-2 rounded shadow transition">
                        <i class="fa-solid fa-eraser"></i> Limpiar
                    </button>
                </div>
            </div>

            <div class="border-t border-slate-200 pt-4 mt-5 space-y-3">
                <h2 class="text-sm font-black text-slate-800 uppercase tracking-wider flex items-center gap-2">
                    <i class="fa-solid fa-layer-group text-indigo-600"></i> Análisis Espacial GIS
                </h2>
                
                <div class="flex flex-col gap-3 bg-slate-50 p-4 rounded-lg border border-slate-200 shadow-inner">
                    <label class="flex items-center gap-3 text-xs font-black text-slate-700 cursor-pointer p-1 hover:bg-white rounded transition">
                        <input type="checkbox" id="toggleHeatmap" class="w-4 h-4 accent-orange-500">
                        🔥 Mapa de Calor (Zonas Rojas)
                    </label>

                    <div class="h-px bg-slate-200 w-full my-1"></div>

                    <label class="flex items-center gap-3 text-xs font-bold text-slate-700 cursor-pointer p-1 hover:bg-white rounded transition">
                        <input type="checkbox" id="toggleUPC" checked class="w-4 h-4 accent-blue-600">
                        🚓 Desplegar Red de UPCs
                    </label>
                    
                    <label class="flex items-center gap-3 text-xs font-bold text-slate-700 cursor-pointer p-1 hover:bg-white rounded transition">
                        <input type="checkbox" id="toggleHospital" checked class="w-4 h-4 accent-teal-500">
                        🏥 Desplegar Hospitales Base
                    </label>
                    
                    <label class="flex items-center gap-3 text-xs font-bold text-slate-700 cursor-pointer p-1 hover:bg-white rounded transition">
                        <input type="checkbox" id="toggleRutas" checked class="w-4 h-4 accent-red-600">
                        📍 Auto-Trazar Despacho Cercano
                    </label>
                </div>
            </div>

            <div class="mt-auto bg-slate-800 rounded-lg p-4 text-center shadow-inner">
                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Alertas Históricas SICOA</span>
                <span id="counterEmergencias" class="block text-4xl font-black text-white mt-1">0</span>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-full bg-slate-200 relative">
            <div id="map" class="flex-1 w-full z-0"></div>

            <div class="h-64 bg-white border-t border-slate-300 shadow-2xl flex flex-col z-10">
                <div class="bg-slate-800 px-4 py-2 flex justify-between items-center border-b border-slate-700">
                    <h3 class="font-bold text-white text-xs uppercase tracking-widest flex items-center">
                        <i class="fa-solid fa-list-ul mr-2 text-indigo-400"></i> Consola de Despacho en Vivo
                    </h3>
                    <button id="btnRefresh" class="text-[10px] bg-slate-700 hover:bg-slate-600 text-white px-3 py-1 rounded border border-slate-600 transition">
                        <i class="fa-solid fa-arrows-rotate mr-1"></i> Sincronizar Base
                    </button>
                </div>
                
                <div class="overflow-x-auto w-full pb-4 h-full overflow-y-auto">
                    <table class="min-w-max w-full text-left border-collapse">
                        <thead class="bg-slate-100 sticky top-0 shadow-sm z-10">
                            <tr>
                                <th class="p-3 border-b border-slate-200 text-slate-600 text-[11px] font-black uppercase">Estado / ID</th>
                                <th class="p-3 border-b border-slate-200 text-slate-600 text-[11px] font-black uppercase">Hora Registro</th>
                                <th class="p-3 border-b border-slate-200 text-slate-600 text-[11px] font-black uppercase">Víctima (C.I.)</th>
                                <th class="p-3 border-b border-slate-200 text-slate-600 text-[11px] font-black uppercase text-center">Tipo Evento</th>
                                <th class="p-3 border-b border-slate-200 text-slate-600 text-[11px] font-black uppercase text-center">Género</th>
                                <th class="p-3 border-b border-slate-200 text-slate-600 text-[11px] font-black uppercase w-1/3">Ubicación Geoespacial</th>
                            </tr>
                        </thead>
                        <tbody id="tablaEmergenciasBody" class="divide-y divide-slate-100 bg-white"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="app.js?v=999"></script>
</body>
</html>
